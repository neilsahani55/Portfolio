<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neel Sahani — Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.54/build/spline-viewer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            /* Colors from main portfolio */
            --bg: #030304;
            --surface: #0F1115;
            --text: #FFFFFF;
            --muted: rgba(255, 255, 255, 0.85);
            --accent: #F7931A;
            --accent-deep: #EA580C;
            --gold: #FFD600;
            --glow-orange-1: 0 0 20px -5px rgba(234, 88, 12, 0.5);
            --glow-orange-2: 0 0 30px -5px rgba(247, 147, 26, 0.6);
            
            /* Spacing */
            --space-4: 24px;
            --space-6: 48px;
            
            /* Typography */
            --font-heading: "Inter", sans-serif;
            --font-body: "Inter", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow: hidden; /* Prevent scrolling on the landing page */
            height: 100vh;
            width: 100vw;
        }

        /* Canvas Container for Celestial Matrix */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Main Content Layout */
        .landing-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: var(--space-4);
        }

        /* Left Section */
        .content-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--space-4);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s ease-out forwards 0.5s;
        }

        .hero-name {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .hero-desc {
            font-size: 1.1rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 500px;
        }

        /* Button Styling */
        .btn-enter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            background: linear-gradient(to right, var(--accent-deep), var(--accent));
            border: none;
            border-radius: 999px;
            cursor: pointer;
            text-decoration: none;
            width: fit-content;
            box-shadow: var(--glow-orange-1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-orange-2);
        }
        
        .btn-enter::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn-enter:hover::after {
            opacity: 1;
        }

        /* Right Section - Robot */
        .content-right {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 50vh; /* Ensure visibility on mobile */
        }

        spline-viewer {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
        
        /* Floating animation for the robot container */
        .robot-float {
            width: 100%;
            height: 100%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Desktop Layout */
        @media (min-width: 1024px) {
            .landing-container {
                flex-direction: row;
                padding: var(--space-6);
            }

            .content-left {
                flex: 0 0 40%;
                padding-left: 5%;
            }

            .content-right {
                flex: 0 0 60%;
                height: auto;
                min-height: auto;
            }

            .hero-name {
                font-size: 4.5rem;
            }
            
            .hero-desc {
                font-size: 1.25rem;
            }
        }

        /* Loading Overlay */
        .loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#F7931A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>
    </div>

    <!-- Background Shader -->
    <div id="canvas-container"></div>

    <!-- Main Layout -->
    <div class="landing-container">
        <!-- Left Section -->
        <div class="content-left">
            <h1 class="hero-name">NEEL SAHANI</h1>
            <p class="hero-desc">
                Building scalable automation systems and intelligent solutions. 
                Expert in Python, AI, and backend technologies.
            </p>
            <a href="main.html" class="btn-enter" id="enter-btn">
                Know More
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;">
                    <path d="M5 12h14"></path>
                    <path d="m12 5 7 7-7 7"></path>
                </svg>
            </a>
        </div>

        <!-- Right Section -->
        <div class="content-right">
            <div class="robot-float">
                <spline-viewer url="https://prod.spline.design/PyzDhpQ9E5f1E3MT/scene.splinecode"></spline-viewer>
            </div>
        </div>
    </div>

    <script>
        // Loader Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 800);
        });

        // Navigation Logic
        document.getElementById('enter-btn').addEventListener('click', (e) => {
            e.preventDefault();
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                window.location.href = e.target.closest('a').href;
            }, 500);
        });

        // ==========================================
        // Celestial Matrix Shader Implementation
        // ==========================================
        const container = document.getElementById('canvas-container');

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const clock = new THREE.Clock();

        // Shader Code
        const vertexShader = `
            void main() {
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            precision highp float;
            uniform vec2 iResolution;
            uniform float iTime;
            uniform vec2 iMouse;

            float random(vec2 st) {
                return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
            }

            void main() {
                // normalize coords by height
                vec2 uv = (gl_FragCoord.xy * 2.0 - iResolution.xy) / iResolution.y;
                vec2 mouse = (iMouse * 2.0 - iResolution) / iResolution.y;

                // Mouse interaction warp
                float dist = length(uv - mouse);
                float warp = smoothstep(0.5, 0.0, dist);
                uv += normalize(uv - mouse) * warp * 0.2;

                // Matrix rain effect
                float gridSize = 30.0;
                vec2 gridUv = fract(uv * gridSize);
                vec2 gridId = floor(uv * gridSize);

                float t = iTime * 2.0;
                float rainSpeed = 0.5;
                float fall = fract(gridId.y * 0.1 - t * rainSpeed + random(gridId.xx) * 2.0);

                float character = random(gridId + floor(t * 5.0 * random(gridId.yx)));
                character = step(0.95, character);

                float glow = 1.0 - smoothstep(0.0, 0.8, gridUv.y);
                float intensity = character * glow * fall;

                // Theme Colors (Blue/Green mix from original, tweaked for this theme)
                vec3 color1 = vec3(0.1, 0.3, 0.9);
                vec3 color2 = vec3(0.1, 0.8, 0.5);
                
                // Mix with our orange accent potentially? Let's stick to the matrix cyber look for contrast
                // Or maybe tint it towards the orange theme?
                // Let's keep the original "Celestial" cool tones as a background contrast to the warm foreground
                
                vec3 finalColor = mix(color1, color2, random(gridId)) * intensity;
                finalColor *= (1.0 - random(gridId + t) * 0.2);

                gl_FragColor = vec4(finalColor, 1.0); // Full opacity background
            }
        `;

        // Uniforms
        const uniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            iMouse: { value: new THREE.Vector2(0, 0) }
        };

        const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Events
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('mousemove', (e) => {
            // Flip Y for shader coords
            uniforms.iMouse.value.set(e.clientX, window.innerHeight - e.clientY);
        });

        // Animation Loop
        renderer.setAnimationLoop(() => {
            uniforms.iTime.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
